workflows:
  ios-build:
    name: NeuroDetectLite iOS Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
      vars:
        XCODE_SCHEME: "iosApp"
        BUNDLE_ID: "com.neurodetect.ios"
      xcode: 16.1
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install CocoaPods (onnxruntime)
        script: |
          cd iosApp
          pod install
      - name: Build shared KMP framework (cinterop finds onnxruntime via Pods/)
        script: |
          ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64
      - name: Build iOS app
        script: |
          cd iosApp
          FRAMEWORK_PATH="$PWD/../shared/build/bin/iosSimulatorArm64/debugFramework"
          xcodebuild -workspace iosApp.xcworkspace \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            FRAMEWORK_SEARCH_PATHS="$FRAMEWORK_PATH" \
            OTHER_LDFLAGS="-framework shared" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
    artifacts:
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
    publishing:
      email:
        recipients:
          - bmo_17@proton.me
        notify:
          success: true
          failure: true
